<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link in Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.3);
    --text: #e8e8e8;
    --text-dim: #888;
    --radius: 14px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .page {
    width: 100%;
    max-width: 480px;
    padding: 60px 24px 80px;
    position: relative;
    z-index: 1;
  }

  .profile-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
  }

  .avatar-ring {
    position: relative;
    width: 96px;
    height: 96px;
    margin-bottom: 22px;
  }

  .moon-orbit {
    position: absolute;
    inset: -18px;
    width: calc(100% + 36px);
    height: calc(100% + 36px);
    animation: orbit 6s linear infinite;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes orbit {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .moon-orbit svg {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 24px;
    filter: drop-shadow(0 0 6px rgba(201,168,76,0.9)) drop-shadow(0 0 14px rgba(201,168,76,0.5));
  }

  .orbit-trail {
    position: absolute;
    inset: -18px;
    width: calc(100% + 36px);
    height: calc(100% + 36px);
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.12);
    pointer-events: none;
    z-index: 1;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #c9a84c;
    animation: twinkle 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  .star:nth-child(1) { width: 2px; height: 2px; top: -22px; left: 50%; animation-delay: 0s; opacity: 0.5; }
  .star:nth-child(2) { width: 1.5px; height: 1.5px; top: 50%; right: -22px; animation-delay: 0.7s; opacity: 0.4; }
  .star:nth-child(3) { width: 2px; height: 2px; bottom: -22px; left: 30%; animation-delay: 1.4s; opacity: 0.6; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50%       { opacity: 0.9; transform: scale(1.6); }
  }

  .avatar-img {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface2);
    display: block;
    position: relative;
    z-index: 3;
    border: 2px solid rgba(201,168,76,0.2);
  }

  .profile-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
    text-align: center;
  }

  .profile-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.7;
    max-width: 260px;
    letter-spacing: 0.03em;
  }

  .links-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text);
    transition: var(--transition);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.5s forwards;
  }

  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-dim), transparent);
    opacity: 0;
    transition: var(--transition);
  }

  .link-item:hover::before { opacity: 1; }
  .link-item:hover { border-color: var(--gold-dim); transform: translateY(-1px); }

  .link-icon { font-size: 1.3rem; min-width: 28px; text-align: center; }
  .link-label { font-size: 0.9rem; font-weight: 400; flex: 1; letter-spacing: 0.01em; }
  .link-arrow { color: var(--gold); font-size: 0.85rem; opacity: 0.7; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<div class="page" id="mainPage">
  <div class="profile-wrap">
    <div class="avatar-ring">
      <div class="orbit-trail"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="moon-orbit">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" fill="#c9a84c" opacity="0.95"/>
          <circle cx="16" cy="9" r="8.5" fill="#0a0a0a"/>
          <circle cx="7" cy="13" r="1" fill="rgba(201,168,76,0.4)"/>
          <circle cx="9" cy="8" r="0.6" fill="rgba(201,168,76,0.3)"/>
        </svg>
      </div>
      <img class="avatar-img" id="avatarImg" src="" alt="avatar"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2296%22 height=%2296%22><rect width=%2296%22 height=%2296%22 rx=%2248%22 fill=%22%231c1c1c%22/></svg>'">
    </div>
    <h1 class="profile-name" id="profileName"></h1>
    <p class="profile-desc" id="profileDesc"></p>
  </div>
  <div class="links-list" id="linksList"></div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   EDIT DI SINI SAJA untuk ganti profil & link.
   Tidak ada mode dev — semua diatur langsung lewat kode.
   ════════════════════════════════════════════════════════ */

const PROFILE = {
  name: "Xenyura Gaming",
  desc: "Welcome To Xenyura Gaming! Download Aplikasi/File Dibawah Ini 👇🏻.",
  avatar: "https://i.ibb.co.com/3Gw8Gvz/profil-You-Tube.jpg" // isi dengan URL gambar, contoh: "https://i.imgur.com/xxxx.jpg"
};

const LINKS = [
  { icon: "🌐", label: "Tutorial Cara Lewati Link",        url: "https://youtu.be/-N4wiittZvM?si=OgxsQdzjzC8ldepZ" },
  { icon: "✂️", label: "Capcut MOD 19.0.0",       url: "https://go.paid4link.com/Tl8yOYE" }
  // Tambah link baru: salin satu baris di atas, ganti icon, label, dan url-nya.
  // Contoh:
  // { icon: "\ud83c\udfb5", label: "TikTok", url: "https://tiktok.com/@username" },
];

/* ════════════════════════════════════════════════════════
   Jangan diubah kecuali tahu apa yang dilakukan
   ════════════════════════════════════════════════════════ */

document.getElementById('profileName').textContent = PROFILE.name;
document.getElementById('profileDesc').textContent = PROFILE.desc;

const avatarEl = document.getElementById('avatarImg');
avatarEl.src = PROFILE.avatar || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96"><rect width="96" height="96" rx="48" fill="#1c1c1c"/></svg>');

const list = document.getElementById('linksList');
LINKS.forEach((link, i) => {
  const a = document.createElement('a');
  a.href = link.url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.className = 'link-item';
  a.style.animationDelay = (i * 0.08) + 's';
  a.innerHTML = `<span class="link-icon">${link.icon}</span><span class="link-label">${link.label}</span><span class="link-arrow">\u2192</span>`;
  list.appendChild(a);
});
</script>
</body>
</html>
